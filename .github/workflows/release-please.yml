on:
  push:
    branches:
      - master
      - main

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: fohte
          identity: ${{ github.event.repository.name }}-release-please
          domain: octo-sts.fohte.net

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.octo-sts.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Update major version tag (e.g., v1) to allow referencing presets as:
      #   extends: github:fohte/runok-presets/base@v1
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0
          token: ${{ steps.octo-sts.outputs.token }}

      - name: Update major version tag
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git tag --force "v${{ steps.release.outputs.major }}" "${{ steps.release.outputs.tag_name }}"
          git push --force origin "refs/tags/v${{ steps.release.outputs.major }}"
