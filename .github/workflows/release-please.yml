      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Update major version tag (e.g., v1) to allow referencing presets as:
      #   extends: github:fohte/runok-presets/base@v1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ steps.release.outputs.release_created }}
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Update major version tag
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git tag --force "v${{ steps.release.outputs.major }}" "${{ steps.release.outputs.tag_name }}"
          git push --force origin "refs/tags/v${{ steps.release.outputs.major }}"
