name: Test

on:
  push:
    branches-ignore:
      # Skip release-please branches (Release PRs) since they only update CHANGELOG and version
      - release-please--branches--*

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: fohte
          identity: ${{ github.event.repository.name }}
          domain: octo-sts.fohte.net

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Check if current commit is auto-format by bot
        id: check-auto-format
        run: |
          commit_message=$(git log -1 --format=%s)
          commit_author=$(git log -1 --format=%an)
          echo "Current commit message: $commit_message"
          echo "Current commit author: $commit_author"

          # Skip if the current commit is an auto-format commit by a bot
          # to prevent infinite loop: auto-format push -> CI -> auto-format push -> ...
          if [ "$commit_message" = "style: auto-format" ] && [[ "$commit_author" == *"[bot]"* ]]; then
            echo "skip_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.12

      - name: Run lefthook
        id: lefthook
        continue-on-error: true
        env:
          # pinact's min-age check calls the GitHub API; without a token it hits
          # the 60 req/h unauthenticated limit shared per IP and fails on CI.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: lefthook run pre-commit --all-files

      # Formatters configured with `stage_fixed: true` run `git add` after formatting,
      # which stages the changes.
      # commit-action uses `git ls-files --modified` which only detects unstaged changes.
      # https://github.com/suzuki-shunsuke/commit-action/blob/87b297f0ce551411b43d1880f4fb3cbc60381055/action.yaml#L57
      # We need to unstage the changes so commit-action can detect them.
      - name: Unstage changes for commit-action
        run: git restore --staged .

      - name: Commit formatted files
        if: ${{ !cancelled() && steps.check-auto-format.outputs.skip_commit != 'true' }}
        uses: suzuki-shunsuke/commit-action@06e3b49d4706498d325d29bd85adc82ecf2f5d8f # v1.0.0
        with:
          commit_message: 'style: auto-format'
          workflow: deny
          github_token: ${{ steps.octo-sts.outputs.token }}

      - name: Fail if lefthook failed
        if: steps.lefthook.outcome == 'failure'
        run: exit 1

  e2e-setup:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.compute.outputs.versions }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Compute runok version matrix
        id: compute
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          latest=$(gh release view -R fohte/runok --json tagName -q .tagName)

          # Pick the highest floor across all presets so the chosen min satisfies every required_runok_version.
          min_bare=$(grep -hE "^required_runok_version:" -- ./*.yml \
            | sed -E "s/.*>=[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/" \
            | sort -V | tail -n1)
          if [ -z "$min_bare" ]; then
            echo "::error::no required_runok_version found in any preset"
            exit 1
          fi
          min="v${min_bare}"

          highest="v$(printf '%s\n%s\n' "${latest#v}" "$min_bare" | sort -V | tail -n1)"
          if [ "$highest" != "$latest" ]; then
            echo "::error::required_runok_version floor ($min) exceeds latest runok release ($latest)"
            exit 1
          fi

          if [ "$latest" = "$min" ]; then
            versions=$(jq -nc --arg v "$latest" '[$v]')
          else
            versions=$(jq -nc --arg l "$latest" --arg m "$min" '[$l, $m]')
          fi
          echo "latest=$latest min=$min versions=$versions"
          echo "versions=$versions" >> "$GITHUB_OUTPUT"

  e2e:
    needs: e2e-setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runok_version: ${{ fromJSON(needs.e2e-setup.outputs.versions) }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install runok
        env:
          GH_TOKEN: ${{ github.token }}
          RUNOK_VERSION: ${{ matrix.runok_version }}
        run: |
          gh release download "$RUNOK_VERSION" -R fohte/runok -p 'runok-x86_64-unknown-linux-gnu.tar.gz' -O - | tar xz
          sudo mv runok /usr/local/bin/

      - name: Run preset E2E tests
        run: |
          for f in base.yml definitions.yml readonly-unix.yml readonly-git.yml readonly-gh.yml; do
            echo "--- Testing $f ---"
            runok test -c "$f"
          done
