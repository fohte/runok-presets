# Update major version tag (e.g., v1) when a new release is published.
# This allows users to reference presets by major version:
#   extends: github:fohte/runok-presets/base@v1

name: update-major-version-tag

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-major-version-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update major version tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # Extract major version (e.g., v1.2.3 -> v1)
          if [[ ! "$RELEASE_TAG" =~ ^v([0-9]+)\. ]]; then
            echo "::notice::Skipping: tag '$RELEASE_TAG' does not match vMAJOR.x.x pattern"
            exit 0
          fi

          major_tag="v${BASH_REMATCH[1]}"

          echo "Updating tag '$major_tag' to point to '$RELEASE_TAG'"

          git tag --force "$major_tag" "$RELEASE_TAG"
          git push --force origin "refs/tags/$major_tag"
