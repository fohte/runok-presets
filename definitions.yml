# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

# Wrapper command definitions for recursive evaluation.
#
# These patterns tell runok which commands wrap other commands,
# so that the inner command can be evaluated against rules.

definitions:
  wrappers:
    - 'bash -c <cmd>'
    - 'sh -c <cmd>'
    - 'zsh -c <cmd>'
    - 'eval <cmd>'
    - 'sudo <opts> <cmd>'
    - 'xargs <opts> <cmd>'
    - 'time <cmd>'
    - 'env <opts> <vars> <cmd>'
    - 'command <cmd>'
    - 'timeout <opts> * <cmd>'
    - 'nice <opts> <cmd>'
    - 'nohup <cmd>'
    - 'stdbuf <opts> <cmd>'
    - "find * -exec|-execdir|-ok|-okdir <cmd> \\;|+"
    # bare `*` (not `<opts>`) is required on both sides: `<opts>` never matches when
    # zero tokens precede a literal flag, e.g. `mapfile -C <cmd>` alone. `-*C` (not
    # `-C`) matches bash's `-t`/`-C` flag bundling, e.g. `mapfile -tC <cmd>`.
    - 'mapfile * -*C <cmd> *'
    - 'readarray * -*C <cmd> *'

tests:
  extends:
    - ./readonly-unix.yml
    - ./readonly-git.yml
  cases:
    # bash -c
    - allow: 'bash -c "cat /etc/hosts"'
    - ask: 'bash -c "rm -rf /"'

    # sh -c
    - allow: 'sh -c "cat /etc/hosts"'
    - ask: 'sh -c "rm -rf /"'

    # zsh -c
    - allow: 'zsh -c "cat /etc/hosts"'
    - ask: 'zsh -c "rm -rf /"'

    # eval
    - allow: 'eval "cat /etc/hosts"'
    - ask: 'eval "rm -rf /"'

    # sudo
    - allow: 'sudo cat /etc/shadow'
    - ask: 'sudo rm -rf /'
    - allow: 'sudo -u root cat /etc/shadow'

    # xargs
    - allow: 'xargs -I{} cat {} < filelist.txt'
    - ask: 'xargs -I{} rm {} < filelist.txt'

    # time
    - allow: 'time cat /etc/hosts'
    - ask: 'time rm -rf /'

    # env
    - allow: 'env FOO=bar cat /etc/hosts'
    - ask: 'env FOO=bar rm -rf /'
    - allow: 'env -S "FOO=bar" cat /etc/hosts'
    - allow: 'env -u FOO cat /etc/hosts'
    - allow: 'env -i FOO=bar cat /etc/hosts'

    # command
    - allow: 'command cat /etc/hosts'
    - ask: 'command rm -rf /'

    # timeout
    - allow: 'timeout 10 cat /etc/hosts'
    - ask: 'timeout 10 rm -rf /'
    - allow: 'timeout --preserve-status 10 cat /etc/hosts'

    # nice
    - allow: 'nice -n 10 cat /etc/hosts'
    - ask: 'nice -n 10 rm -rf /'
    - allow: 'nice cat /etc/hosts'

    # nohup
    - allow: 'nohup cat /etc/hosts'
    - ask: 'nohup rm -rf /'

    # stdbuf
    - allow: 'stdbuf -oL cat /etc/hosts'
    - ask: 'stdbuf -oL rm -rf /'
    - allow: 'stdbuf -i0 -oL -eL cat /etc/hosts'

    # find -exec
    - allow: 'find . -name "*.log" -exec cat {} \;'
    - ask: 'find . -name "*.log" -exec rm {} \;'
    - allow: 'find /tmp -name "*.log" -execdir cat {} \;'
    - allow: 'find . -name "*.log" -exec cat {} +'

    # mapfile -C
    - allow: "mapfile -t -C 'cat /etc/hosts' arr"
    - ask: "mapfile -t -C 'rm -rf /' arr"
    - allow: "mapfile -C 'cat /etc/hosts' arr"
    - allow: "mapfile -tC 'cat /etc/hosts' arr"
    - ask: "mapfile -tC 'rm -rf /' arr"

    # readarray -C
    - allow: "readarray -t -C 'cat /etc/hosts' arr"
    - ask: "readarray -t -C 'rm -rf /' arr"
    - allow: "readarray -C 'cat /etc/hosts' arr"
    - allow: "readarray -tC 'cat /etc/hosts' arr"
    - ask: "readarray -tC 'rm -rf /' arr"
