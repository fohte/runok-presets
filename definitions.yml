# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

# Wrapper command definitions for recursive evaluation.
#
# These patterns tell runok which commands wrap other commands,
# so that the inner command can be evaluated against rules.

definitions:
  wrappers:
    - 'bash -c <cmd>'

    - 'sh -c <cmd>'

    - 'sudo <opts> <cmd>'

    - 'xargs <opts> <cmd>'

    - 'time <cmd>'

    - 'env <opts> <vars> <cmd>'

    - 'command <cmd>'

    - 'timeout <opts> * <cmd>'

    - 'nice <opts> <cmd>'

    - 'nohup <cmd>'

    - 'stdbuf <opts> <cmd>'

    - "find * -exec|-execdir|-ok|-okdir <cmd> \\;|+"

tests:
  extends:
    - ./readonly-unix.yml
    - ./readonly-git.yml
  cases:
    - allow: 'bash -c "cat /etc/hosts"'
    - ask: 'bash -c "rm -rf /"'
    - allow: 'sh -c "cat /etc/hosts"'
    - ask: 'sh -c "rm -rf /"'
    - allow: 'sudo cat /etc/shadow'
    - ask: 'sudo rm -rf /'
    - allow: 'sudo -u root cat /etc/shadow'
    - allow: 'xargs -I{} cat {} < filelist.txt'
    - ask: 'xargs -I{} rm {} < filelist.txt'
    - allow: 'time cat /etc/hosts'
    - ask: 'time rm -rf /'
    - allow: 'env FOO=bar cat /etc/hosts'
    - ask: 'env FOO=bar rm -rf /'
    - allow: 'env -S "FOO=bar" cat /etc/hosts'
    - allow: 'env -u FOO cat /etc/hosts'
    - allow: 'env -i FOO=bar cat /etc/hosts'
    - allow: 'command cat /etc/hosts'
    - ask: 'command rm -rf /'
    - allow: 'timeout 10 cat /etc/hosts'
    - ask: 'timeout 10 rm -rf /'
    - allow: 'timeout --preserve-status 10 cat /etc/hosts'
    - allow: 'nice -n 10 cat /etc/hosts'
    - ask: 'nice -n 10 rm -rf /'
    - allow: 'nice cat /etc/hosts'
    - allow: 'nohup cat /etc/hosts'
    - ask: 'nohup rm -rf /'
    - allow: 'stdbuf -oL cat /etc/hosts'
    - ask: 'stdbuf -oL rm -rf /'
    - allow: 'stdbuf -i0 -oL -eL cat /etc/hosts'
    - allow: 'find . -name "*.log" -exec cat {} \;'
    - ask: 'find . -name "*.log" -exec rm {} \;'
    - allow: 'find /tmp -name "*.log" -execdir cat {} \;'
    - allow: 'find . -name "*.log" -exec cat {} +'
