# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

required_runok_version: '>=0.2.3'

# Read-only GitHub CLI (gh) commands.
#
# Allows gh subcommands that do not modify any state.
# Write operations (create, merge, close, delete, edit, comment, etc.) are not included.

definitions:
  flag_groups:
    query-field: '-f|-F|--raw-field|--field *'

rules:
  # ── gh api ──
  # -X GET / --method GET is always safe, even with field parameters or --paginate.
  # --paginate can fetch enormous result sets and cause excessive API usage,
  # even with GET requests.
  - allow: 'gh [-R|--repo *] api * -X|--method GET !--paginate *'
    tests:
      - allow: 'gh api -X GET /repos/cli/cli/pulls'
      - allow: 'gh api -X GET /repos/cli/cli/pulls -F per_page=1'
      - allow: 'gh api --method GET /repos/cli/cli/pulls -F per_page=1'
      - allow: 'gh api -X GET /repos/cli/cli/commits -F per_page=1 --jq .[0].sha'
      - allow: 'gh api -X GET /repos/cli/cli/pulls -f state=open -F per_page=10'
      - allow: 'gh -R cli/cli api -X GET /repos/cli/cli/pulls --field per_page=1'
      - allow: 'gh api -X GET /repos/cli/cli/pulls --raw-field per_page=1'
      - ask: 'gh api -X POST /repos/cli/cli/issues'
      - ask: 'gh api -X PUT /repos/cli/cli/issues/1'
      - ask: 'gh api -X DELETE /repos/cli/cli/issues/1'
      - ask: 'gh api -X PATCH /repos/cli/cli/issues/1'
      - ask: 'gh api --method POST /repos/cli/cli/issues'
      - ask: 'gh api --method DELETE /repos/cli/cli/issues/1'
  # Without explicit -X/-method, allow only if no field/input/graphql/paginate flags
  # (which default to POST or can cause excessive API usage).
  - allow: 'gh [-R|--repo *] api !graphql !-X|--method !-f|-F|--field|--raw-field|--input !--paginate *'
    tests:
      - allow: 'gh api /repos/cli/cli'
      - allow: 'gh -R cli/cli api /repos/cli/cli'
      - allow: 'gh --repo cli/cli api /repos/cli/cli'
      - ask: 'gh api /repos/cli/cli/issues -f title=test -f body=test'
      - ask: 'gh api /repos/cli/cli/issues -F title=test'
      - ask: 'gh api /repos/cli/cli/issues --field title=test'
      - ask: 'gh api /repos/cli/cli/issues --raw-field title=test'
      - ask: 'gh api /repos/cli/cli/issues --input body.json'
      - ask: 'gh api -X POST /repos/cli/cli/issues -F title=test'
      # graphql is excluded from this rule, but allowed by the GraphQL rules below
      - allow: 'gh api graphql -f query="{ viewer { login } }"'
      - ask: 'gh api --paginate /repos/cli/cli/issues'
      - ask: 'gh api -X GET --paginate /repos/cli/cli/pulls'
      - ask: 'gh -R cli/cli api --paginate /repos/cli/cli/issues'

  # ── Generic read-only subcommands (list / view / status) ──
  - allow: 'gh [-R|--repo *] * list|view|status *'
    tests:
      - allow: 'gh pr list'
      - allow: 'gh pr list --state open --limit 20'
      - allow: 'gh -R cli/cli pr list'
      - allow: 'gh --repo cli/cli pr list'
      - allow: 'gh pr view 123'
      - allow: 'gh pr view 123 --json title,body'
      - allow: 'gh pr status'
      - allow: 'gh issue list'
      - allow: 'gh issue list --label bug'
      - allow: 'gh issue view 456'
      - allow: 'gh issue view 456 --json title,body'
      - allow: 'gh issue status'
      - allow: 'gh repo list'
      - allow: 'gh repo list fohte --limit 10'
      - allow: 'gh repo view cli/cli'
      - allow: 'gh repo view cli/cli --json name,description'
      - allow: 'gh run list'
      - allow: 'gh run list --limit 5'
      - allow: 'gh -R cli/cli run list'
      - allow: 'gh --repo cli/cli run list'
      - allow: 'gh run view 12345'
      - allow: 'gh run view 12345 --log'
      - allow: 'gh workflow list'
      - allow: 'gh workflow view deploy.yml'
      - allow: 'gh release list'
      - allow: 'gh release view v1.0.0'
      - allow: 'gh label list'
      - allow: 'gh -R cli/cli label list'
      - allow: 'gh variable list'
      - allow: 'gh gist list'
      - allow: 'gh gist view abc123'
      - allow: 'gh cache list'
      - allow: 'gh ruleset list'
      - allow: 'gh ruleset view 123'
      - allow: 'gh project list'
      - allow: 'gh project view 1'
      - allow: 'gh project field-list 1'
      - allow: 'gh project item-list 1'
      - allow: 'gh codespace list'
      - allow: 'gh extension list'
      - allow: 'gh ssh-key list'
      - allow: 'gh gpg-key list'
      - allow: 'gh config list'
      - allow: 'gh auth status'

  - allow: 'gh [-R|--repo *] project *-list *'

  # ── variable get ──
  - allow: 'gh [-R|--repo *] variable get *'
    tests:
      - allow: 'gh variable get MY_VAR'
      - allow: 'gh variable get DEPLOY_ENV'
      - allow: 'gh --repo cli/cli variable get DEPLOY_ENV'

  # ── PR / issue read-only subcommands beyond list/view/status ──
  - allow: 'gh [-R|--repo *] pr diff|checks *'
    tests:
      - allow: 'gh pr diff 123'
      - allow: 'gh pr checks 123'

  # ── Ruleset check ──
  - allow: 'gh [-R|--repo *] ruleset check *'
    tests:
      - allow: 'gh ruleset check main'

  # ── Search ──
  - allow: 'gh [-R|--repo *] search *'
    tests:
      - allow: 'gh search repos cli'
      - allow: 'gh search issues "bug label:help-wanted"'
      - allow: 'gh search prs "fix in:title"'
      - allow: 'gh search commits "initial commit"'
      - allow: 'gh search code "fmt.Println"'

  # ── Browse ──
  - allow: 'gh [-R|--repo *] browse *'
    tests:
      - allow: 'gh browse'
      - allow: 'gh browse --no-browser'
      - allow: 'gh browse src/main.go'
      - allow: 'gh --repo cli/cli browse'

  # ── Config get ──
  - allow: 'gh [-R|--repo *] config get *'
    tests:
      - allow: 'gh config get editor'

  # ── Attestation (read-only) ──
  - allow: 'gh [-R|--repo *] attestation verify|trusted-root *'
    tests:
      - allow: 'gh attestation verify artifact.tar.gz'
      - allow: 'gh attestation trusted-root'

  # ── Status (top-level) ──
  - allow: 'gh status *'
    tests:
      - allow: 'gh status'

  # ── GraphQL read-only queries ──
  # gh api graphql requires -f/-F/--raw-field/--field to pass the query.
  # Allow only when the query value does not start with "mutation".
  # --paginate is excluded to prevent excessive API usage.
  # --input is not covered because file contents cannot be inspected.
  - allow: 'gh [-R|--repo *] api graphql !--paginate <flag:query-field> *'
    when: '!flag_groups["query-field"].exists(v, v.startsWith("query=mutation"))'
    tests:
      - allow: 'gh api graphql -f query="query { viewer { login } }"'
      - allow: 'gh api graphql -f query="{ viewer { login } }"'
      - allow: 'gh api graphql -f query="query { repository(owner: \"cli\", name: \"cli\") { name } }"'
      - allow: 'gh api graphql -f query="query { repository(name: \"mutation-testing-tool\") { name } }"'
      - allow: 'gh api graphql -f query="query { viewer { login } }" -f variables="{}"'
      - allow: 'gh -R cli/cli api graphql -f query="query { viewer { login } }"'
      - allow: 'gh api graphql -f query="query { viewer { login } }" --jq .data.viewer.login'
      - ask: 'gh api graphql -f query="mutation { createIssue(input: {}) { issue { id } } }"'
      - ask: 'gh api graphql -f query="mutation CreateIssue { createIssue(input: {}) { issue { id } } }"'
      - ask: 'gh api graphql -f query="mutation { createIssue(input: {}) { issue { id } } }" -f variables="{}"'
      - ask: 'gh api graphql -f variables="{}" -f query="mutation { createIssue(input: {}) { issue { id } } }"'
      - ask: 'gh api graphql --paginate -f query="query { viewer { login } }"'
      - allow: 'gh api graphql -F query="query { viewer { login } }"'
      - ask: 'gh api graphql -F query="mutation { createIssue(input: {}) { issue { id } } }"'
      - allow: 'gh api graphql --field query="query { viewer { login } }"'
      - ask: 'gh api graphql --field query="mutation { createIssue(input: {}) { issue { id } } }"'
      - allow: 'gh api graphql --raw-field query="query { viewer { login } }"'
      - ask: 'gh api graphql --raw-field query="mutation { createIssue(input: {}) { issue { id } } }"'

tests:
  cases:
    - ask: 'gh attestation download artifact.tar.gz'
    - ask: 'gh pr create --title "test" --body "test"'
    - ask: 'gh pr merge 123'
    - ask: 'gh pr close 123'
    - ask: 'gh pr edit 123 --title "new title"'
    - ask: 'gh pr comment 123 --body "comment"'
    - ask: 'gh pr review 123 --approve'
    - ask: 'gh pr ready 123'
    - ask: 'gh pr reopen 123'
    - ask: 'gh pr revert 123'
    - ask: 'gh pr checkout 123'
    - ask: 'gh pr lock 123'
    - ask: 'gh pr unlock 123'
    - ask: 'gh pr update-branch'
    - ask: 'gh issue create --title "bug" --body "desc"'
    - ask: 'gh issue close 456'
    - ask: 'gh issue edit 456 --title "new title"'
    - ask: 'gh issue comment 456 --body "comment"'
    - ask: 'gh issue reopen 456'
    - ask: 'gh issue delete 456'
    - ask: 'gh issue transfer 456 cli/cli'
    - ask: 'gh issue lock 456'
    - ask: 'gh issue pin 456'
    - ask: 'gh repo create my-repo'
    - ask: 'gh repo delete my-repo'
    - ask: 'gh repo fork cli/cli'
    - ask: 'gh repo clone cli/cli'
    - ask: 'gh repo edit --description "new desc"'
    - ask: 'gh repo archive my-repo'
    - ask: 'gh repo rename new-name'
    - ask: 'gh run rerun 12345'
    - ask: 'gh run cancel 12345'
    - ask: 'gh run watch 12345'
    - ask: 'gh run delete 12345'
    - ask: 'gh run download 12345'
    - ask: 'gh workflow run deploy.yml'
    - ask: 'gh workflow enable deploy.yml'
    - ask: 'gh workflow disable deploy.yml'
    - ask: 'gh release create v2.0.0'
    - ask: 'gh release delete v1.0.0'
    - ask: 'gh release edit v1.0.0 --notes "updated"'
    - ask: 'gh auth login'
    - ask: 'gh auth logout'
    - ask: 'gh gist create file.txt'
    - ask: 'gh gist edit abc123'
    - ask: 'gh gist delete abc123'
    - ask: 'gh label create bug'
    - ask: 'gh label edit bug --name bugfix'
    - ask: 'gh label delete bug'
    - ask: 'gh config set editor vim'
    - ask: 'gh secret set MY_SECRET'
    - ask: 'gh secret delete MY_SECRET'
    - ask: 'gh variable set MY_VAR'
    - ask: 'gh variable delete MY_VAR'
    - ask: 'gh cache delete --all'
    - ask: 'gh project create --title "My Project"'
    - ask: 'gh project close 1'
    - ask: 'gh project delete 1'
    - ask: 'gh project edit 1 --title "new"'
    - ask: 'gh codespace create'
    - ask: 'gh codespace delete'
    - ask: 'gh extension install owner/repo'
    # GraphQL mutation must remain ask
    - ask: 'gh api graphql -f query="mutation { createIssue(input: {}) { issue { id } } }"'
    - ask: 'gh api graphql --input query.graphql'
    - ask: 'gh api graphql --paginate -f query="query { viewer { login } }"'
