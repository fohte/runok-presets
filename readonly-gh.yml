# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

# Read-only GitHub CLI (gh) commands.
#
# Allows gh subcommands that do not modify any state.
# Write operations (create, merge, close, delete, edit, comment, etc.) are not included.

rules:
  # ── gh api ──
  # -X with non-GET methods is blocked; graphql may contain mutations.
  #[test] ask: gh api -X POST /repos/cli/cli/issues
  #[test] ask: gh api -X PUT /repos/cli/cli/issues/1
  #[test] ask: gh api -X DELETE /repos/cli/cli/issues/1
  #[test] ask: gh api -X PATCH /repos/cli/cli/issues/1
  #[test] ask: gh api --method POST /repos/cli/cli/issues
  #[test] ask: gh api --method DELETE /repos/cli/cli/issues/1
  - ask: 'gh [-R|--repo *] api * -X|--method !GET *'
  #[test] ask: gh api graphql -f query="{ viewer { login } }"
  - ask: 'gh [-R|--repo *] api graphql *'
  #[test] allow: gh api /repos/cli/cli
  #[test] allow: gh api -X GET /repos/cli/cli/pulls
  #[test] allow: gh -R cli/cli api /repos/cli/cli
  #[test] allow: gh --repo cli/cli api /repos/cli/cli
  - allow: 'gh [-R|--repo *] api *'

  # ── Generic read-only subcommands (list / view / status) ──
  #[test] allow: gh pr list
  #[test] allow: gh pr list --state open --limit 20
  #[test] allow: gh -R cli/cli pr list
  #[test] allow: gh --repo cli/cli pr list
  #[test] allow: gh pr view 123
  #[test] allow: gh pr view 123 --json title,body
  #[test] allow: gh pr status
  #[test] allow: gh issue list
  #[test] allow: gh issue list --label bug
  #[test] allow: gh issue view 456
  #[test] allow: gh issue view 456 --json title,body
  #[test] allow: gh issue status
  #[test] allow: gh repo list
  #[test] allow: gh repo list fohte --limit 10
  #[test] allow: gh repo view cli/cli
  #[test] allow: gh repo view cli/cli --json name,description
  #[test] allow: gh run list
  #[test] allow: gh run list --limit 5
  #[test] allow: gh -R cli/cli run list
  #[test] allow: gh --repo cli/cli run list
  #[test] allow: gh run view 12345
  #[test] allow: gh run view 12345 --log
  #[test] allow: gh workflow list
  #[test] allow: gh workflow view deploy.yml
  #[test] allow: gh release list
  #[test] allow: gh release view v1.0.0
  #[test] allow: gh label list
  #[test] allow: gh -R cli/cli label list
  #[test] allow: gh variable list
  #[test] allow: gh gist list
  #[test] allow: gh gist view abc123
  #[test] allow: gh cache list
  #[test] allow: gh ruleset list
  #[test] allow: gh ruleset view 123
  #[test] allow: gh project list
  #[test] allow: gh project view 1
  #[test] allow: gh project field-list 1
  #[test] allow: gh project item-list 1
  #[test] allow: gh codespace list
  #[test] allow: gh extension list
  #[test] allow: gh ssh-key list
  #[test] allow: gh gpg-key list
  #[test] allow: gh config list
  #[test] allow: gh auth status
  - allow: 'gh [-R|--repo *] * list|view|status *'
  - allow: 'gh [-R|--repo *] project *-list *'

  # ── variable get ──
  #[test] allow: gh variable get MY_VAR
  #[test] allow: gh variable get DEPLOY_ENV
  #[test] allow: gh --repo cli/cli variable get DEPLOY_ENV
  - allow: 'gh [-R|--repo *] variable get *'

  # ── PR / issue read-only subcommands beyond list/view/status ──
  #[test] allow: gh pr diff 123
  #[test] allow: gh pr checks 123
  - allow: 'gh [-R|--repo *] pr diff|checks *'

  # ── Ruleset check ──
  #[test] allow: gh ruleset check main
  - allow: 'gh [-R|--repo *] ruleset check *'

  # ── Search ──
  #[test] allow: gh search repos cli
  #[test] allow: gh search issues "bug label:help-wanted"
  #[test] allow: gh search prs "fix in:title"
  #[test] allow: gh search commits "initial commit"
  #[test] allow: gh search code "fmt.Println"
  - allow: 'gh [-R|--repo *] search *'

  # ── Browse (URL display only, no browser opening) ──
  #[test] allow: gh browse --no-browser
  #[test] allow: gh browse --no-browser src/main.go
  #[test] allow: gh -R cli/cli browse --no-browser
  #[test] allow: gh --repo cli/cli browse --no-browser
  #[test] ask: gh browse
  - allow: 'gh [-R|--repo *] browse --no-browser *'

  # ── Config get ──
  #[test] allow: gh config get editor
  - allow: 'gh [-R|--repo *] config get *'

  # ── Attestation (read-only) ──
  #[test] allow: gh attestation verify artifact.tar.gz
  #[test] allow: gh attestation trusted-root
  - allow: 'gh [-R|--repo *] attestation verify|trusted-root *'
  #[test] ask: gh attestation download artifact.tar.gz

  # ── Status (top-level) ──
  #[test] allow: gh status
  - allow: 'gh status *'

  # ── Commands not in allow list (write / destructive operations) ──
  #[test] ask: gh pr create --title "test" --body "test"
  #[test] ask: gh pr merge 123
  #[test] ask: gh pr close 123
  #[test] ask: gh pr edit 123 --title "new title"
  #[test] ask: gh pr comment 123 --body "comment"
  #[test] ask: gh pr review 123 --approve
  #[test] ask: gh pr ready 123
  #[test] ask: gh pr reopen 123
  #[test] ask: gh pr revert 123
  #[test] ask: gh pr checkout 123
  #[test] ask: gh pr lock 123
  #[test] ask: gh pr unlock 123
  #[test] ask: gh pr update-branch
  #[test] ask: gh issue create --title "bug" --body "desc"
  #[test] ask: gh issue close 456
  #[test] ask: gh issue edit 456 --title "new title"
  #[test] ask: gh issue comment 456 --body "comment"
  #[test] ask: gh issue reopen 456
  #[test] ask: gh issue delete 456
  #[test] ask: gh issue transfer 456 cli/cli
  #[test] ask: gh issue lock 456
  #[test] ask: gh issue pin 456
  #[test] ask: gh repo create my-repo
  #[test] ask: gh repo delete my-repo
  #[test] ask: gh repo fork cli/cli
  #[test] ask: gh repo clone cli/cli
  #[test] ask: gh repo edit --description "new desc"
  #[test] ask: gh repo archive my-repo
  #[test] ask: gh repo rename new-name
  #[test] ask: gh run rerun 12345
  #[test] ask: gh run cancel 12345
  #[test] ask: gh run watch 12345
  #[test] ask: gh run delete 12345
  #[test] ask: gh run download 12345
  #[test] ask: gh workflow run deploy.yml
  #[test] ask: gh workflow enable deploy.yml
  #[test] ask: gh workflow disable deploy.yml
  #[test] ask: gh release create v2.0.0
  #[test] ask: gh release delete v1.0.0
  #[test] ask: gh release edit v1.0.0 --notes "updated"
  #[test] ask: gh auth login
  #[test] ask: gh auth logout
  #[test] ask: gh gist create file.txt
  #[test] ask: gh gist edit abc123
  #[test] ask: gh gist delete abc123
  #[test] ask: gh label create bug
  #[test] ask: gh label edit bug --name bugfix
  #[test] ask: gh label delete bug
  #[test] ask: gh config set editor vim
  #[test] ask: gh secret set MY_SECRET
  #[test] ask: gh secret delete MY_SECRET
  #[test] ask: gh variable set MY_VAR
  #[test] ask: gh variable delete MY_VAR
  #[test] ask: gh cache delete --all
  #[test] ask: gh project create --title "My Project"
  #[test] ask: gh project close 1
  #[test] ask: gh project delete 1
  #[test] ask: gh project edit 1 --title "new"
  #[test] ask: gh codespace create
  #[test] ask: gh codespace delete
  #[test] ask: gh extension install owner/repo
