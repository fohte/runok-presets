# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

# Read-only Unix commands.
#
# Allows common Unix commands that do not modify the filesystem.
# Commands with destructive flags are excluded via negation patterns.

rules:
  # ── File viewing ──
  - allow: 'cat *'
  - allow: 'tac *'
  - allow: 'head *'
  - allow: 'tail *'
  - allow: 'nl *'
  - allow: 'less *'
  - allow: 'more *'
  - allow: 'bat *'

  # ── Directory and file information ──
  - allow: 'ls *'
  - allow: 'dir *'
  - allow: 'tree *'
  - allow: 'stat *'
  - allow: 'file *'
  - allow: 'du *'
  - allow: 'df *'
  - allow: 'find !-delete|-fprint|-fprint0|-fprintf|-fls|-exec|-execdir|-ok|-okdir *'
  - allow: 'fd *'
  - allow: 'basename *'
  - allow: 'dirname *'
  - allow: 'readlink *'
  - allow: 'realpath *'
  - allow: 'pathchk *'
  - allow: 'lsof *'

  # ── Text search ──
  - allow: 'grep *'
  - allow: 'egrep *'
  - allow: 'fgrep *'
  - allow: 'rg *'
  - allow: 'ag *'
  - allow: 'ack *'

  # ── Text processing ──
  - allow: 'sed !-i|--in-place *'
  # awk/gawk excluded: language-internal features (> "file" redirection,
  # system()) allow arbitrary file writes and command execution that cannot
  # be controlled through CLI argument matching.
  - allow: 'sort !-o|--output *'
  - allow: 'uniq *'
  - allow: 'cut *'
  - allow: 'tr *'
  - allow: 'paste *'
  - allow: 'join *'
  - allow: 'fold *'
  - allow: 'fmt *'
  - allow: 'col *'
  - allow: 'column *'
  - allow: 'rev *'
  - allow: 'expand *'
  - allow: 'unexpand *'
  - allow: 'colrm *'
  - allow: 'pr *'
  - allow: 'wc *'
  - allow: 'jq *'
  - allow: 'yq !-i|--inplace *'

  # ── File comparison ──
  - allow: 'diff *'
  - allow: 'diff3 *'
  - allow: 'sdiff !-o|--output *'
  - allow: 'cmp *'
  - allow: 'comm *'

  # ── Binary and dump display ──
  - allow: 'od *'
  - allow: 'hexdump *'
  - allow: 'xxd !-r|--revert *'
  - allow: 'strings *'

  # ── Checksums and hashes ──
  - allow: 'cksum *'
  - allow: 'sum *'
  - allow: 'md5 *'
  - allow: 'md5sum *'
  - allow: 'sha1sum *'
  - allow: 'sha224sum *'
  - allow: 'sha256sum *'
  - allow: 'sha384sum *'
  - allow: 'sha512sum *'
  - allow: 'shasum *'
  - allow: 'b2sum *'

  # ── Compressed file viewing ──
  - allow: 'zcat *'
  - allow: 'bzcat *'
  - allow: 'xzcat !-z|--rm *'
  - allow: 'zstdcat !-z|--rm|-o *'
  - allow: 'zgrep *'
  - allow: 'bzgrep *'
  - allow: 'zegrep *'
  - allow: 'zfgrep *'
  - allow: 'zdiff *'
  - allow: 'zcmp *'
  - allow: 'bzdiff *'
  - allow: 'bzcmp *'
  - allow: 'zmore *'
  - allow: 'zless *'
  - allow: 'bzmore *'
  - allow: 'bzless *'
  - allow: 'zipinfo *'
  - allow: 'zipgrep *'

  # ── Archive listing (read-only mode) ──
  - allow: 'tar -t|--list *'
  - allow: 'unzip -l *'
  - allow: 'unzip -t *'

  # ── System information ──
  - allow: 'uname *'
  - allow: 'arch'
  - allow: 'hostname'
  - allow: 'hostid'
  - allow: 'nproc'
  - allow: 'uptime'
  - allow: 'date !-s|--set *'
  - allow: 'cal *'
  - allow: 'ncal *'

  # ── User and group information ──
  - allow: 'id *'
  - allow: 'whoami'
  - allow: 'who *'
  - allow: 'w'
  - allow: 'users'
  - allow: 'groups *'
  - allow: 'logname'
  - allow: 'last *'
  - allow: 'finger *'
  - allow: 'pinky *'

  # ── Process information ──
  - allow: 'ps *'
  - allow: 'pgrep *'
  # top: interactive mode can send signals, but this preset targets LLM
  # agents which operate non-interactively. No filesystem writes involved.
  - allow: 'top *'

  # ── Environment and configuration ──
  - allow: 'printenv *'
  - allow: 'locale *'
  - allow: 'getconf *'
  - allow: 'tty'
  - allow: 'tput *'

  # ── Command lookup ──
  - allow: 'which *'
  - allow: 'whereis *'
  - allow: 'whatis *'
  - allow: 'apropos *'
  - allow: 'man *'
  - allow: 'type *'

  # ── Math and numbers ──
  - allow: 'expr *'
  - allow: 'bc *'
  - allow: 'dc *'
  - allow: 'factor *'
  - allow: 'numfmt *'
  - allow: 'seq *'
  - allow: 'jot *'

  # ── Shell builtins ──
  - allow: ': *'
  - allow: '[ *'
  - allow: 'cd *'
  - allow: 'pwd'
  - allow: 'read *'

  # ── Output ──
  - allow: 'echo *'
  - allow: 'printf *'
  - allow: 'yes *'
  - allow: 'true'
  - allow: 'false'
  - allow: 'test *'

  # ── Miscellaneous utilities ──
  - allow: 'sleep *'

  # ── Encoding and decoding ──
  - allow: 'base32 *'
  - allow: 'base64 *'
  - allow: 'basenc *'

  # ── DNS queries ──
  - allow: 'dig *'
  - allow: 'nslookup *'
  - allow: 'host *'
  - allow: 'whois *'

  # ── Network information ──
  - allow: 'netstat *'

  # ── ELF/object information ──
  - allow: 'nm *'
  - allow: 'objdump *'
  - allow: 'readelf *'
  - allow: 'otool *'
  - allow: 'ldd *'
