# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

# Base preset that bundles all standard presets.
#
# Usage in your runok.yml:
#   extends:
#     - 'github:fohte/runok-presets/base'

extends:
  - ./definitions.yml
  - ./readonly-unix.yml
  - ./readonly-git.yml
  - ./readonly-gh.yml

rules:
  # Any command with --help or --version is safe to run.
  - allow: '* --help'
    tests:
      - allow: 'ls --help'

  - allow: '* --version'
    tests:
      - allow: 'git --version'

  # runok read-only subcommands are safe for all preset users.
  - allow: 'runok check *'
    tests:
      - allow: 'runok check -- git status'
      - allow: 'runok check --output-format json -- ls -la'

  - allow: 'runok test *'
    tests:
      - allow: 'runok test'
      - allow: 'runok test -c runok.yml'

  - allow: 'runok audit *'
    tests:
      - allow: 'runok audit'

  - allow: 'runok config-schema'
    tests:
      - allow: 'runok config-schema'

tests:
  cases:
    - allow: 'git log --oneline | head -20'
    - allow: 'git shortlog -sn | head -10'
    - allow: 'git ls-files | grep "\.ts$"'
    - allow: 'ps aux | grep nginx'
    - allow: 'cat /etc/passwd | cut -d: -f1 | sort'
    - allow: 'diff <(git show HEAD:README.md) <(cat README.md)'
    - allow: 'cat /etc/hosts'
