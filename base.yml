# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

# Base preset that bundles all standard presets.
#
# Usage in your runok.yml:
#   extends:
#     - 'github:fohte/runok-presets/base'

#[test] allow: git log --oneline | head -20
#[test] allow: git shortlog -sn | head -10
#[test] allow: git ls-files | grep "\.ts$"
#[test] allow: ps aux | grep nginx
#[test] allow: cat /etc/passwd | cut -d: -f1 | sort
#[test] allow: diff <(git show HEAD:README.md) <(cat README.md)
#[test] allow: cat /etc/hosts
extends:
  - ./definitions.yml
  - ./readonly-unix.yml
  - ./readonly-git.yml

rules:
  # Any command with --help or --version is safe to run.
  #[test] allow: ls --help
  - allow: '* --help'
  #[test] allow: git --version
  - allow: '* --version'
