# yaml-language-server: $schema=https://raw.githubusercontent.com/fohte/runok/main/schema/runok.schema.json

# Base preset that bundles all standard presets.
#
# Usage in your runok.yml:
#   extends:
#     - 'github:fohte/runok-presets/base'

#[test] allow: git log --oneline
#[test] allow: cat /etc/hosts
extends:
  - ./definitions.yml
  - ./readonly-unix.yml
  - ./readonly-git.yml

#[test] allow: bash -c "cat /etc/hosts"
#[test] ask: bash -c "rm -rf /"
#[test] allow: sudo cat /etc/shadow
#[test] allow: find . -name "*.log" -exec cat {} \;
#[test] ask: find . -name "*.log" -exec rm {} \;
#[test] allow: env FOO=bar cat /etc/hosts
#[test] allow: xargs -I{} cat {}
rules:
  # Any command with --help or --version is safe to run.
  #[test] allow: ls --help
  - allow: '* --help'
  #[test] allow: git --version
  - allow: '* --version'
